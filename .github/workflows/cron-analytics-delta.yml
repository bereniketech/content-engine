name: Cron — Analytics Delta

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger analytics-delta
        run: |
          curl -sf -X POST "${{ vars.APP_URL }}/api/cron/analytics-delta" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
