name: Cron — Schedule Worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger schedule-worker
        run: |
          curl -sf -X POST "${{ vars.APP_URL }}/api/cron/schedule-worker" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
