name: Cron — Daily Credit Rollup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-credit-rollup
        run: |
          curl -sf -X POST "${{ vars.APP_URL }}/api/cron/daily-credit-rollup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
